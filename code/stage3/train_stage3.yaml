# Stage3 config. Fill the required paths first; most other values can keep defaults.

model_params:
  # Required: original Qwen2.5-VL-3B checkpoint directory.
  model_id_or_path: ./Qwen2.5VL-3B

path_params:
  # Required: Stage1/2 pipeline output directory. It must contain artifacts.yaml.
  pipeline_run_dir: /path/to/pipeline_run_dir

data_params:
  # Required: Stage3 training JSONL file(s).
  dataset:
    - /path/to/train.jsonl

output_params:
  # Stage3 outputs are saved under output_root/<timestamp>/.
  output_root: ./Outputs/stage3/generic

run_params:
  seed: 42
  stage: null

# Defaults. Usually no need to edit.
data_defaults:
  max_length: 2048
  split_dataset_ratio: 0
  num_proc: 4

system_prompts:
  stage1: ''
  stage2-pre: ''
  stage2-post: To identify fake news, learn to detect conflicts within them.

lora_params:
  lora_rank: 8
  lora_alpha: 16
  freeze_llm: false
  freeze_vit: true
  freeze_aligner: false

training_params:
  deepspeed: ./deepspeed_zero2.json
  learning_rate: 0.0001
  per_device_train_batch_size: 5
  per_device_eval_batch_size: 1
  gradient_checkpointing: false
  weight_decay: 0.1
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  report_to:
    - tensorboard
  logging_first_step: true
  save_strategy: steps
  save_steps: 200
  eval_strategy: steps
  eval_steps: 100000
  gradient_accumulation_steps: 1
  num_train_epochs: 3
  metric_for_best_model: loss
  save_total_limit: 3
  logging_steps: 5
  dataloader_num_workers: 4
  remove_unused_columns: false
  bf16: true
  tf32: true
